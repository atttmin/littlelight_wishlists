# This workflow will do a clean install of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-nodejs-with-github-actions

name: Bundle Wishlists

on:
  push:
    branches: [ main ]

jobs:
  build:
    if: github.triggering_actor != 'LittleLightBot'
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Create wishlist bundles
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
    - run: npm ci
    - run: npm run bundler

    - name: Generate DIM wishlist files
      run: python3 convert_to_dim.py
    
    - uses: stefanzweifel/git-auto-commit-action@v4
      with:
        commit_message: rebuilt bundles + DIM wishlists
        push_options: '--force'
        commit_user_name: Little Light Bot
        commit_user_email: jao+markezine.me
